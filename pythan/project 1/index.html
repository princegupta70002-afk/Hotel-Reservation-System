<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snake Water Gun Game</title>

    <!-- CSS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e2f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .game-container {
            background: #2c2c44;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 350px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .buttons button {
            margin: 10px;
            padding: 12px 22px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 6px;
            border: none;
        }

        .buttons button:hover {
            background-color: #6c63ff;
            color: white;
        }

        .result {
            margin-top: 20px;
        }

        #gameResult {
            margin-top: 10px;
            color: #ffd700;
        }
    </style>
</head>

<body>

    <div class="game-container">
        <h1>Snake 🐍 Water 💧 Gun 🔫</h1>
        <p>Choose your option:</p>

        <div class="buttons">
            <button onclick="playGame('s')">Snake</button>
            <button onclick="playGame('w')">Water</button>
            <button onclick="playGame('g')">Gun</button>
        </div>

        <div class="result">
            <p id="userChoice"></p>
            <p id="computerChoice"></p>
            <h2 id="gameResult"></h2>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        function playGame(userInput) {

            // Mapping (same logic as Python)
            const youDict = { "s": 1, "w": -1, "g": 0 };
            const reverseDict = { 1: "Snake", "-1": "Water", 0: "Gun" };

            let you = youDict[userInput];
            let choices = [1, -1, 0];
            let computer = choices[Math.floor(Math.random() * choices.length)];

            document.getElementById("userChoice").innerText =
                "You chose: " + reverseDict[you];
            document.getElementById("computerChoice").innerText =
                "Computer chose: " + reverseDict[computer];

            let result = "";

            // Game Logic
            if (computer === you) {
                result = "It's a draw!";
            }
            else if (
                (you === 1 && computer === -1) ||
                (you === -1 && computer === 0) ||
                (you === 0 && computer === 1)
            ) {
                result = "You win!";
            }
            else {
                result = "You lose!";
            }

            document.getElementById("gameResult").innerText = result;
        }
    </script>

</body>
</html>
