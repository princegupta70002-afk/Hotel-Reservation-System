<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Number Guessing Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .game-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 10px;
        }

        input {
            width: 80%;
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #5a67d8;
        }

        .message {
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
        }

        .attempts {
            margin-top: 10px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="game-box">
    <h2>🎯 Number Guessing Game</h2>
    <p>Guess a number between <b>1 and 100</b></p>

    <input type="number" id="guessInput" placeholder="Enter your guess">
    <br>
    <button onclick="checkGuess()">Guess</button>

    <div class="message" id="message"></div>
    <div class="attempts" id="attempts"></div>
</div>

<script>
    // Same as: n = random.randint(1,100)
    let n = Math.floor(Math.random() * 100) + 1;
    let guesses = 0;

    function checkGuess() {
        let a = Number(document.getElementById("guessInput").value);
        let message = document.getElementById("message");
        let attempts = document.getElementById("attempts");

        if (!a) {
            message.innerText = "Please enter a number!";
            message.style.color = "red";
            return;
        }

        guesses++;

        if (a > n) {
            message.innerText = "Lower number please ⬇️";
            message.style.color = "orange";
        }
        else if (a < n) {
            message.innerText = "Higher number please ⬆️";
            message.style.color = "orange";
        }
        else {
            message.innerText = `🎉 Correct! Number was ${n}`;
            message.style.color = "green";
        }

        attempts.innerText = `Attempts: ${guesses}`;
    }
</script>

</body>
</html>
